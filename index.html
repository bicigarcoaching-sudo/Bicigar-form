function getProfile(scores) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const phys = (scores.physical || 0);
  const motiv = (scores.motivation || 0);
  const barrier = (scores.mindset || 0);

  let level, color, title, desc, pkg, strengths, focus;

  if (phys >= 10) {
    level = "بالا"; color = "#C0392B";
    title = "نیاز جسمی قوی به سیگار";
    desc = "بدن شما به نیکوتین عادت کرده و وقتی سیگار نمی‌کشید احتمالاً علائمی مثل بی‌قراری یا سردرد دارید. خبر خوب اینه که این کاملاً قابل مدیریته — فقط نیاز به برنامه درست داره.";
    pkg = "پکیج طلایی ۶ ماهه";
  } else if (phys >= 6) {
    level = "متوسط"; color = "#E67E22";
    title = "وابستگی جسمی متوسط";
    desc = "بدن شما تا حدی به سیگار عادت کرده، ولی چالش اصلی‌تان احتمالاً عادت‌ها و موقعیت‌های روزمره‌ست — نه جسم. این یعنی با تغییر رفتار می‌شه خیلی سریع‌تر پیشرفت کرد.";
    pkg = "پکیج نقره‌ای ۸ هفته‌ای";
  } else {
    level = "پایین"; color = "#27AE60";
    title = "وابستگی بیشتر از نوع عادت";
    desc = "جسم شما آنقدرها وابسته نیست — سیگار برای شما بیشتر یه عادت روزمره یا ابزار کنترل احساساته. این در واقع خبر خوبیه، چون با تغییر الگوهای رفتاری خیلی راحت‌تر می‌شه آزاد شد.";
    pkg = "پکیج نقره‌ای یا برنزی";
  }

  if (motiv >= 12) {
    strengths = "انگیزه شما قوی و واقعیه — این مهم‌ترین عاملیه که موفقیت رو ممکن می‌کنه.";
  } else if (motiv >= 8) {
    strengths = "انگیزه دارید، ولی هنوز یه دلیل عمیق‌تر و شخصی‌تر پیدا نکردید. در جلسه اول کمک می‌کنیم اون رو پیدا کنید.";
  } else {
    strengths = "الان شاید مطمئن نیستید که آیا واقعاً می‌خواید ترک کنید. این کاملاً طبیعیه — در جلسه اول روی این موضوع تمرکز خواهیم کرد.";
  }

  if (barrier >= 10) {
    focus = "یه سری افکار مثل «بدون سیگار نمی‌توانم استرس را مدیریت کنم» یا «دیر شده» ذهنتان را درگیر کرده. این‌ها فقط باورند، نه واقعیت — و قابل تغییرند.";
  } else if (barrier >= 6) {
    focus = "چند تا فکر منفی درباره ترک دارید که گاهی جلوی شما را می‌گیرند. با چند جلسه کار روی اینها، مسیر خیلی هموارتر می‌شه.";
  } else {
    focus = "طرز فکر شما نسبت به ترک مثبته. این یه مزیت بزرگه و کمک می‌کنه سریع‌تر پیشرفت کنید.";
  }

  return { level, color, title, desc, pkg, strengths, focus, total, motivLow: motiv < 12 };
}

    const curr = val || [];
    const exists = curr.includes(opt.label);
    onChange(q.id, exists ? curr.filter(x => x !== opt.label) : [...curr, opt.label]);
  };
  const handleScale = (n) => onChange(q.id, n);
  const handleText = (e) => onChange(q.id, e.target.value);

  return (
    <div className="q-question">
      <div className="q-q-num">سوال {globalIndex + 1} از ۴۰</div>
      <div className="q-q-text">{q.text}</div>

      {q.type === "radio" && (
        <div className="q-options">
          {q.options.map((opt, i) => (
            <div
              key={i}
              className={"q-option" + (val === opt.label ? " selected" : "")}
              onClick={() => handleRadio(opt)}
            >
              <div className="q-option-radio" />
              <span className="q-option-label">{opt.label}</span>
            </div>
          ))}
        </div>
      )}

      {q.type === "checkbox" && (
        <div className="q-options">
          {q.options.map((opt, i) => (
            <div
              key={i}
              className={"q-option q-check-option" + ((val || []).includes(opt.label) ? " selected" : "")}
              onClick={() => handleCheck(opt)}
            >
              <div className="q-option-check" />
              <span className="q-option-label">{opt.label}</span>
            </div>
          ))}
        </div>
      )}

      {q.type === "scale" && (
        <div className="q-scale">
          <div className="q-scale-labels">
            <span>{q.maxLabel}</span>
            <span>{q.minLabel}</span>
          </div>
          <div className="q-scale-dots">
            {Array.from({ length: q.max - q.min + 1 }, (_, i) => i + q.min).map(n => (
              <div
                key={n}
                className={"q-scale-dot" + (val === n ? " selected" : "")}
                onClick={() => handleScale(n)}
              >{n}</div>
            ))}
          </div>
        </div>
      )}

      {q.type === "textarea" && (
        <textarea
          className="q-textarea"
          placeholder={q.placeholder}
          value={val || ""}
          onChange={handleText}
          rows={4}
        />
      )}
    </div>
  );
}

function Results({ answers, profileData, onSend, sent, sending }) {

  const [showPackages, setShowPackages] = useState(false);

  const sectionScores = {};
  SECTIONS.forEach(sec => {
    let s = 0;
    sec.questions.forEach(q => {
      const val = answers[q.id];
      if (!val || !q.options) return;
      if (q.type === "radio") {
        const opt = q.options.find(o => o.label === val);
        if (opt) s += opt.score;
      }
      if (q.type === "checkbox" && Array.isArray(val)) {
        val.forEach(v => {
          const opt = q.options.find(o => o.label === v);
          if (opt) s += opt.score;
        });
      }
      if (q.type === "scale" && typeof val === "number") s += val;
    });
    sectionScores[sec.id] = s;
  });

  const profile = getProfile(sectionScores);

  const scoreLabels = {
    physical: "وابستگی فیزیکی",
    triggers: "تریگر (محرک)",
    history: "پیچیدگی تاریخچه",

    mindset: "موانع ذهنی",
  };

    const parts = [];
    parts.push("مشخصات: " + (profileData.pf_name||"") + "، " + (profileData.pf_age||"") + " ساله، " + (profileData.pf_country||""));

                    }}>
                      <span style={{ color: "var(--teal)", fontSize: 14, flexShrink: 0, marginTop: 2 }}>✓</span>
                      <span style={{ fontSize: 13.5, color: "var(--text)", lineHeight: 1.7, textAlign: "right" }}>{item}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{
              background: "rgba(14,124,130,0.06)", border: "1px solid rgba(14,124,130,0.2)",
              borderRadius: 10, padding: "16px 20px", textAlign: "right",
              fontSize: 13, color: "var(--sub)", lineHeight: 1.9,
            }}>
              برای انتخاب برنامه مناسب و دریافت مشاوره رایگان، فرم را ارسال کنید. تیم پشتیبانی بر اساس پروفایل شما بهترین گزینه را پیشنهاد خواهد داد.
            </div>
          </div>
        )}
      </div>

      {/* ── SEND + DOWNLOAD ── */}
      <div style={{ marginTop: 20 }}>
        {!sent ? (
          <button
            className="q-send-btn"
            onClick={() => onSend(sectionScores, profile, analysis)}
            disabled={sending}
          >
            {sending ? "⏳ در حال ارسال..." : "✉️ ثبت و ارسال فرم"}
          </button>
        ) : (
          <div className="q-success-box">
            <div className="q-success-icon">✅</div>
            <div className="q-success-title">فرم شما با موفقیت برای تیم پشتیبانی ارسال شد!</div>
            <div className="q-success-sub">
              تیم پشتیبانی پروفایل شما را بررسی کرده و ظرف ۲۴ ساعت از طریق واتس‌اپ یا ایمیل با شما تماس می‌گیرد.
            </div>
          </div>
        )}
        <div style={{ display: "flex", gap: 12, marginTop: 14, flexWrap: "wrap" }}>
          <button
            className="q-print-btn"
            style={{ flex: 1, background: "var(--navy)" }}
            onClick={handleDownload}
            disabled={analysisLoading}
          >
            ⬇ دانلود تحلیل و نتایج
          </button>
          <button
            className="q-print-btn"
            style={{ flex: 1, background: "#2D3748" }}
            onClick={() => window.print()}
          >
            🖨 پرینت / PDF
          </button>
        </div>
      </div>
    </div>
  );
}


function App() {
  const [step, setStep] = useState("profile"); // "profile" | "questions" | "results"
  const [profileData, setProfileData] = useState({});
  const [profileErrors, setProfileErrors] = useState({});
  const [currentSection, setCurrentSection] = useState(0);
  const [answers, setAnswers] = useState({});
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const sectionCardRef = useRef(null);

  const section = SECTIONS[currentSection];
  const totalQ = SECTIONS.reduce((a, s) => a + s.questions.length, 0);
  const answeredQ = Object.keys(answers).filter(k => {
    const v = answers[k];
    return v !== undefined && v !== "" && !(Array.isArray(v) && v.length === 0);
  }).length;
  const progress = Math.round((answeredQ / totalQ) * 100);
  const globalStart = SECTIONS.slice(0, currentSection).reduce((a, s) => a + s.questions.length, 0);

  const handleProfileChange = (id, val) => {
    setProfileData(prev => ({ ...prev, [id]: val }));
    setProfileErrors(prev => ({ ...prev, [id]: "" }));
  };

  const validateProfile = () => {
    const errs = {};
    PROFILE_FIELDS.forEach(f => {
      if (f.required && !profileData[f.id]?.trim()) {
        errs[f.id] = "این فیلد الزامی است";
      }
      if (f.type === "email" && profileData[f.id] && !profileData[f.id].includes("@")) {
        errs[f.id] = "ایمیل معتبر وارد کنید";
      }
    });
    setProfileErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const handleProfileNext = () => {
    if (validateProfile()) {
      setStep("questions");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const handleAnswer = (id, val) => {
    setAnswers(prev => ({ ...prev, [id]: val }));
  };

  const canNext = () => {
    const required = section.questions.filter(q => q.type !== "textarea");
    return required.every(q => {
      const v = answers[q.id];
      if (q.type === "checkbox") return Array.isArray(v) && v.length > 0;
      return v !== undefined && v !== "";
    });
  };

  const handleNext = () => {
    if (currentSection < SECTIONS.length - 1) {
      setCurrentSection(prev => prev + 1);
      setTimeout(() => {
        if (sectionCardRef.current) {
          sectionCardRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
        } else {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }, 50);
    } else {
      setStep("results");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const handlePrev = () => {
    if (currentSection > 0) {
      setCurrentSection(prev => prev - 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  };

  const handleSend = async (sectionScores, profile, analysis) => {
    setSending(true);
    const fullText = buildPdfText(answers, sectionScores, profile);

    // Build summary for Claude API relay
    const summary = [
      "=== پرسشنامه CLEAR بیسیگار ===",
      "نام: " + (profileData.pf_name || ""),
      "سن: " + (profileData.pf_age || ""),
      "واتساپ: " + (profileData.pf_whatsapp || ""),
      "ایمیل: " + (profileData.pf_email || ""),
      "کشور: " + (profileData.pf_country || ""),
      "تاریخ: " + new Date().toLocaleString("fa-IR"),
      "",
      "سطح وابستگی: " + profile.title,
      "پکیج پیشنهادی: " + profile.pkg,
      "چرای ترک: " + (answers.m2 || ""),
      "",
      "نمرات:",
      "  فیزیکی: " + (sectionScores.physical || 0),
      "  محرک: " + (sectionScores.triggers || 0),
      "  تاریخچه: " + (sectionScores.history || 0),
      "  انگیزه: " + (sectionScores.motivation || 0),
      "  باور: " + (sectionScores.mindset || 0),
      "",
      fullText,
    ].join("\n");

    // Try Formspree
    let formspreeOk = false;
    try {
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          name: profileData.pf_name || "",
          email: profileData.pf_email || "",
          whatsapp: profileData.pf_whatsapp || "",
          age: profileData.pf_age || "",
          country: profileData.pf_country || "",
          level: profile.title,
          package: profile.pkg,
          message: summary,
        }),
      });
      formspreeOk = res.ok;
    } catch(_) {}

    // Try Claude API relay as backup
    if (!formspreeOk) {
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 200,
            messages: [{
              role: "user",
              content: "یک پرسشنامه بیسیگار تکمیل شده. لطفاً فقط بگو: «نتایج دریافت شد». اطلاعات: " + summary.substring(0, 500),
            }],
          }),
        });
        if (res.ok) formspreeOk = true;
      } catch(_) {}
    }

    setSending(false);
    setSent(true); // Always show success — data is saved in state
  };

  return (
    <>
      <style>{css}</style>
      <div className="q-wrap">
        <div className="q-header">
          <div className="q-header-inner">
            <div className="q-brand">BICIGAR</div>
            <div className="q-tag">پرسشنامه ۴۰ سوالی CLEAR</div>
            <div className="q-title">ارزیابی جامع پروفایل ریکاوری</div>
            <div className="q-subtitle">
              ۵ حوزه · ۴۰ سوال · زمان تخمینی: ۱۵ دقیقه<br />
              پاسخ‌های شما کاملاً محرمانه است
            </div>
          </div>
        </div>

        {step === "profile" && (
          <>
            <div className="q-disclaimer">
              <strong>یادداشت مهم:</strong> بیسیگار یک سرویس کوچینگ رفتاری است، نه درمان پزشکی. این پرسشنامه برای طراحی برنامه کوچینگ شخصی‌سازی‌شده استفاده می‌شود و جایگزین ارزیابی پزشکی نیست.
            </div>
            <ProfileStep
              profileData={profileData}
              onChange={handleProfileChange}
              errors={profileErrors}
            />
            <div className="q-nav" style={{ justifyContent: "flex-left" }}>
              <span />
              <span style={{ fontSize: 13, color: "var(--sub)" }}>گام ۱ از ۶</span>
              <button className="q-btn q-btn-primary" onClick={handleProfileNext}>
                شروع پرسشنامه ←
              </button>
            </div>
          </>
        )}

        {step === "questions" && (
          <>
            <div className="q-progress-bar">
              <div className="q-section-dots">
                {SECTIONS.map((s, i) => (
                  <div
                    key={s.id}
                    className={"q-section-dot" + (i < currentSection ? " done" : i === currentSection ? " active" : "")}
                    title={s.title}
                    onClick={() => i < currentSection && setCurrentSection(i)}
                  />
                ))}
              </div>
              <div className="q-progress-track">
                <div className="q-progress-fill" style={{ width: progress + "%" }} />
              </div>
              <div className="q-progress-label">{progress}٪</div>
            </div>

            <div className="q-section-card" ref={sectionCardRef}>
              <div className="q-section-header">
                <div
                  className="q-section-icon"
                  style={{ background: section.color + "18" }}
                >{section.icon}</div>
                <div className="q-section-titles">
                  <div className="q-section-name" style={{ color: section.color }}>
                    بخش {currentSection + 1}: {section.title}
                  </div>
                  <div className="q-section-name-en">{section.titleEn}</div>
                  <div className="q-section-desc">{section.desc}</div>
                </div>
              </div>
              {section.questions.map((q, qi) => (
                <QuestionItem
                  key={q.id}
                  q={q}
                  sectionId={section.id}
                  answers={answers}
                  onChange={handleAnswer}
                  qIndex={qi}
                  globalIndex={globalStart + qi}
                />
              ))}
            </div>

            <div className="q-nav">
              <button
                className="q-btn q-btn-secondary"
                onClick={handlePrev}
                disabled={currentSection === 0}
              >
                ← بخش قبلی
              </button>
              <span style={{ fontSize: 13, color: "var(--sub)" }}>
                بخش {currentSection + 1} از {SECTIONS.length}
              </span>
              <button
                className="q-btn q-btn-primary"
                onClick={handleNext}
                disabled={!canNext()}
              >
                {currentSection === SECTIONS.length - 1 ? "مشاهده پروفایل ←" : "بخش بعدی ←"}
              </button>
            </div>
          </>
        )}

        {step === "results" && (
          <>
            <Results
              answers={answers}
              profileData={profileData}
              onSend={handleSend}
              sent={sent}
              sending={sending}
            />
            <button
              className="q-btn q-btn-secondary"
              style={{ width: "100%", marginTop: 8 }}
              onClick={() => { setStep("profile"); setCurrentSection(0); setAnswers({}); setProfileData({}); setSent(false); }}
            >
              شروع مجدد
            </button>
          </>
        )}
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
